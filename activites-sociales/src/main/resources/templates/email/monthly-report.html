<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{email/layout :: page('Rapport mensuel', 'Administration — Activités Sociales', ~{::section})}">
<body>
<section th:fragment="section">
  <p class="greeting">Bonjour,</p>
  <p>Veuillez trouver ci-joint le rapport mensuel des activités sociales pour la période :</p>
  <div class="card">
    <p><strong>Période :</strong> <span th:text="${monthLabel}">Juin 2026</span></p>
    <p>Le fichier Excel est attaché à cet email.</p>
  </div>
  <a th:href="${portalUrl + '/admin/reports'}" class="btn">Ouvrir les rapports</a>
</section>
</body>
</html>
