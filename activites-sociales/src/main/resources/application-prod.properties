# ── Production Configuration ────────────────────────────────────────────
# All sensitive values come from environment variables

# Server
server.port=9090

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# MongoDB
spring.data.mongodb.uri=${MONGO_URI}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false
app.mail.from=${MAIL_FROM:noreply@tunisietelecom.tn}
app.mail.logo-url=${MAIL_LOGO_URL:https://upload.wikimedia.org/wikipedia/fr/f/f9/LOGO_TT_.jpg}

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_PATH:/uploads/}

# Frontend CORS
app.frontend.url=${FRONTEND_URL:https://activites.tunisietelecom.tn}

# Swagger (disabled in prod)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Logging
logging.level.root=WARN
logging.level.tn.tunisietelecom=INFO
