# ── Test Environment Configuration ─────────────────────────────────────
spring.main.allow-bean-definition-overriding=true

# Use H2 in-memory Database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Exclude MongoDB configurations so tests don't require MongoDB running
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration

# JWT configurations for tests
app.jwt.secret=rrKXKmVpFWcgYmqkLfXCUFe1+jeXuZJtvgbpRGn44Sg=
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# File upload dir for tests
app.upload.dir=target/test-uploads/

# Disable background mailing components in tests
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.test-connection=false
